<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="120" x2="1080" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7F2FB"/>
      <stop offset="1" stop-color="#FCE8D9"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D3557"/>
      <stop offset="1" stop-color="#0E1A2F"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F26B4B"/>
      <stop offset="1" stop-color="#BC3E26"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="210" cy="150" r="86" fill="#FFD9C3" opacity="0.5" filter="url(#soft)"/>
